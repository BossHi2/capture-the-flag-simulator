<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    
    <h1 class="score">red: 0 | blue: 0</h1>

    <div class="game-board">
        <div class="player">
            <div class="countdown"></div>
        </div>
        <div class="flag-wrapper">
            <img id="redFlag" src="redflag.png" class="flag">
            <div class="flag-radius-wrapper">
                <div id="redFlagRadius" class="flag-radius" style="background-color:rgba(255, 0, 0, 0.5)"></div>
            </div>
        </div>


        <div class="flag-wrapper-right">
            <img id ="blueFlag" src="blueflag.png" class="flag">
            <div class="flag-radius-wrapper">
                <div id="blueFlagRadius"  class="flag-radius" style="background-color:rgba(0, 21, 255, 0.5)"></div>
            </div>
        </div>
    </div>
    
    

    <script src="script.js"></script>
</body>
</html>
